<div class="flex min-h-screen bg-slate-100">

  <app-sidebar
    class="fixed left-0 top-0 hidden h-screen w-72 overflow-y-auto border-r border-slate-200 bg-white lg:flex lg:flex-col"
  ></app-sidebar>

  <div class="flex min-h-screen flex-1 flex-col lg:ml-72">

    <app-menu
      [screenOperation]="breadCrumbOperation"
      [screenName]="breadCrumbName"
    ></app-menu>

    <main class="flex-1 p-6 pt-22">

      <div class="flex items-start justify-between">

        <app-page-header
          [category]="pageCategory"
          [title]="pageTitle"
          [description]="pageDescription"
        ></app-page-header>

        <app-button
          [label]="buttonLabel"
          [customStyle]="buttonStyle"
          (click)="openCreateUserModal()"
        ></app-button>

      </div>

      <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">

        <app-table [data]="users" [tableConfig]="tableConfig" />

        <div
          class="flex flex-col gap-4 border-t border-slate-200 px-6 py-4 text-sm text-slate-500 lg:flex-row lg:items-center lg:justify-between"
        >
          <p>Showing 1–8 of 8 users</p>

          <div class="flex items-center gap-2">
            @for (button of paginationButtons; track button.label) {
              <app-button
                [label]="button.label"
                [customStyle]="button.style"
              ></app-button>
            }
          </div>
        </div>

      </div>

    </main>
  </div>
</div>

@if (isCreateUserOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">

    <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl border border-slate-200">

      <div class="mb-5">
        <h3 class="text-lg font-semibold text-slate-900">Create new user</h3>
        <p class="text-sm text-slate-500">Add a new user to the system with access permissions.</p>
      </div>

      @if (error()) {
        <div class="mb-4 rounded-xl border border-red-200 bg-red-50 p-3 text-sm text-red-600">
          {{ error() }}
        </div>
      }

      <div class="space-y-4">

        <input
          type="text"
          placeholder="Full name"
          [value]="name()"
          (input)="setName($any($event.target).value)"
          class="h-12 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
        />

        <input
          type="email"
          placeholder="Email"
          [value]="email()"
          (input)="setEmail($any($event.target).value)"
          class="h-12 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
        />

        <div class="space-y-2">
          <p class="text-sm font-medium text-slate-700">Scopes</p>

          <div class="max-h-64 overflow-y-auto grid gap-2 pr-1">
            @for (scope of scopes; track scope.resource + scope.action) {
              <label class="flex items-start gap-3 rounded-xl border border-slate-200 p-3 hover:bg-slate-50 cursor-pointer">

                <input
                  type="checkbox"
                  class="mt-1 h-4 w-4"
                  (change)="toggleScope(scope.resource + ':' + scope.action, $any($event.target).checked)"
                />

                <div>
                  <p class="text-sm font-medium text-slate-800">
                    {{ scope.resource }} : {{ scope.action }}
                  </p>
                  <p class="text-xs text-slate-500">
                    {{ scope.description }}
                  </p>
                </div>

              </label>
            }
          </div>
        </div>

      </div>

      <div class="mt-6 flex justify-end gap-3">

        <app-button
          [label]="'Cancel'"
          [customStyle]="'text-sm font-medium px-4 py-2 text-slate-700 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition cursor-pointer'"
          (click)="closeCreateUserModal()"
        ></app-button>

        <app-button
          [label]="'Create'"
          [customStyle]="'rounded-xl bg-slate-900 px-5 py-2 text-sm font-medium text-white hover:bg-slate-800 transition cursor-pointer'"
          (click)="createUser()"
        ></app-button>

      </div>

    </div>
  </div>
}
