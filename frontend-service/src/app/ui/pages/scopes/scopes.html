<div class="flex min-h-screen bg-slate-100">
  <!-- Side Menu Component -->
  <app-sidebar
    class="fixed left-0 top-0 hidden h-screen w-72 overflow-y-auto border-r border-slate-200 bg-white lg:flex lg:flex-col"
  ></app-sidebar>

  <div class="flex min-h-screen flex-1 flex-col lg:ml-72">
    <!-- Menu Component -->
    <app-menu [screenOperation]="breadCrumb.operation" [screenName]="breadCrumb.name"></app-menu>

    <main class="flex-1 p-6 pt-22">
      <div class="flex items-start justify-between">
        <!-- Page Header Component -->
        <app-page-header
          [category]="pageHeader.category"
          [title]="pageHeader.title"
          [description]="pageHeader.description"
        ></app-page-header>
      </div>
      <section class="px-10 py-8">
        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
          @for (scope of scopes(); track scope.id) {
            <app-scopes-card
              [icon]="scope.icon"
              [resource]="scope.resource"
              [action]="scope.action"
              [description]="scope.description"
            ></app-scopes-card>
          } @empty {
            <div class="col-span-2 text-center text-slate-500 py-10">Scopes not found.</div>
          }
        </div>
      </section>
    </main>
  </div>
</div>
