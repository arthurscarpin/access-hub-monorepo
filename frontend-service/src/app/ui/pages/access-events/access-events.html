<div class="flex min-h-screen bg-slate-100">
  <div class="fixed left-0 top-0 hidden h-screen w-72 overflow-y-auto border-r border-slate-200 bg-white lg:flex lg:flex-col">
    <!-- Side Menu Component -->
    <app-sidebar></app-sidebar>
  </div>
  <div class="flex min-h-screen flex-1 flex-col lg:ml-72">
    <!-- Menu Component -->
    <app-menu 
      [screenOperation]="breadCrumb.operation" 
      [screenName]="breadCrumb.name"
    ></app-menu>
    <main class="flex-1 p-6 pt-22">
      <div class="flex items-start justify-between">
        <!-- Page Header Component -->
        <app-page-header
          [category]="pageHeader.category"
          [title]="pageHeader.title"
          [description]="pageHeader.description"
        ></app-page-header>
      </div> 
      <!-- Acces Events Container -->
      <app-access-events-container></app-access-events-container>
    
    </main>
  </div>
</div>
