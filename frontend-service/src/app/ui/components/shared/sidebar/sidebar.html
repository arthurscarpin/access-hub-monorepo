<aside class="flex h-screen w-72 flex-col border-r border-slate-200 bg-white">
  <!-- Header -->
  <header class="border-b border-slate-200 p-6">
    <div class="flex items-center gap-3">
      <app-logo
        containerStyle="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-900"
        iconStyle="h-5 w-5 text-white"
      ></app-logo>

      <div>
        <h2 class="font-semibold text-slate-900">AccessHub</h2>
        <p class="text-sm text-slate-500">Control Center</p>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4">
    <div class="space-y-8">
      @for (group of menu; track group.group) {
        <div>
          <p class="mb-3 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
            {{ group.group }}
          </p>

          <div class="space-y-1">
            @for (item of group.items; track item.route) {
              <a
                [routerLink]="item.route"
                routerLinkActive="bg-slate-100 text-slate-900 font-medium"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
              >
                <div class="h-4 w-4 text-slate-600 flex items-center justify-center">
                  <ng-container [ngComponentOutlet]="icons[item.icon]"></ng-container>
                </div>
                {{ item.label }}
              </a>
            }
          </div>
        </div>
      }
    </div>
  </nav>

  <!-- User -->
  <div class="border-t border-slate-200 p-4">
    <div class="flex items-center justify-between gap-3">
      <div class="flex min-w-0 items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-200 text-sm font-medium text-slate-700">
          A
        </div>

        <div class="min-w-0">
          <p class="truncate text-sm font-medium text-slate-900">{{ username }}</p>
          <p class="truncate text-xs text-slate-500">{{ email }}</p>
        </div>
      </div>

      <button
        class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 transition hover:border-blue-100 hover:bg-blue-50 hover:text-blue-600 cursor-pointer"
        (click)="logout()"
      >
        <svg lucideLogOut class="h-4 w-4"></svg>
      </button>
    </div>
  </div>
</aside>
