<div class="flex items-center justify-between px-6 py-4">
  <div class="flex items-center gap-4">
    <div 
      class="flex h-11 w-11 items-center justify-center rounded-full"
      [ngClass]="{
        'bg-emerald-50 text-emerald-600': status === 'granted',
        'bg-red-50 text-red-600': status === 'denied'
      }"
    >
      <ng-container *ngComponentOutlet="icon"> </ng-container>
    </div>

    <div>
      <p class="font-medium text-slate-900">
        {{ plate }}
      </p>

      <p class="text-sm text-slate-500">
        {{ vehicle }}
      </p>
    </div>
  </div>

  <span 
    class="rounded-full px-3 py-1 text-xs font-medium"
    [ngClass]="{
      'bg-emerald-50 text-emerald-700': status === 'granted',
      'bg-red-50 text-red-700': status === 'denied'
    }"
  >
    {{ status }}
  </span>
</div>
