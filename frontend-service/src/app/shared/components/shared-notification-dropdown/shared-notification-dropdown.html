<section
  aria-label="Notifications panel"
  class="absolute right-0 top-14 w-80 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl"
>
  <header class="flex items-center justify-between border-b border-slate-100 px-4 py-3">
    <p class="text-sm font-semibold text-slate-900">Notifications</p>

    <button type="button" class="text-xs font-medium text-blue-600 transition hover:text-blue-700 cursor-pointer">
      Mark all
    </button>
  </header>
  <div class="max-h-80 overflow-y-auto">
    <article class="flex cursor-pointer gap-3 px-4 py-3 transition hover:bg-slate-50">
      <div class="mt-1 h-2 w-2 rounded-full bg-yellow-400" aria-hidden="true"></div>
      <div class="flex-1">
        <p class="text-sm font-medium text-slate-900">Import started</p>

        <p class="text-xs text-slate-500">Your owner import process has started.</p>
      </div>
      <div class="mt-1">
        <div class="h-2 w-2 rounded-full bg-blue-500" aria-label="Unread notification"></div>
      </div>
    </article>
    <article class="flex cursor-pointer gap-3 px-4 py-3 transition hover:bg-slate-50">
      <div class="mt-1 h-2 w-2 rounded-full bg-emerald-500" aria-hidden="true"></div>
      <div class="flex-1">
        <p class="text-sm font-medium text-slate-900">Process completed</p>
        <p class="text-xs text-slate-500">The owner synchronization finished successfully.</p>
      </div>
      <div class="mt-1">
        <div class="h-2 w-2 rounded-full bg-slate-300" aria-label="Read notification"></div>
      </div>
    </article>
  </div>
</section>
