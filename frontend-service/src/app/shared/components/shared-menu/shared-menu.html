<header
  class="fixed left-0 top-0 z-40 flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-6 lg:left-72 lg:w-[calc(100%-18rem)]"
>
  <!-- Breadcrumb -->
  <nav aria-label="Breadcrumb" class="flex items-center gap-3">
    <p class="text-sm text-slate-500">{{ config.category }}</p>
    <span aria-hidden="true" class="text-slate-300"> / </span>
    <p class="text-sm font-medium text-slate-900">{{ config.title }}</p>
  </nav>

  <!-- Actions -->
  <div class="relative flex items-center gap-4">
    <button
      type="button"
      aria-label="Open notifications"
      class="relative flex h-11 w-11 items-center justify-center rounded-xl border border-slate-200 bg-white transition hover:bg-slate-50 cursor-pointer"
      (click)="toggleDropdown()"
    >
      <span class="text-slate-600">
        <svg lucideBell class="h-4 w-4"></svg>
      </span>

      <span
        class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white"
      >
        3
      </span>
    </button>

    @if (dropdownStage()) {
      <div class="absolute right-0 top-1 z-50">
        <app-shared-notification-dropdown />
      </div>
    }
  </div>
</header>
