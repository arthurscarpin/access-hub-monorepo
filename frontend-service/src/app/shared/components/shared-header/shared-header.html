<header class="space-y-3">
  <!-- Category -->
  <p class="text-[11px] font-semibold uppercase tracking-[0.16em] text-slate-400">{{ config.category }}</p>

  <!-- Title -->
  <h1 class="text-2xl font-semibold tracking-tight text-slate-900">{{ config.title }}</h1>

  <!-- Description -->
  <p class="max-w-2xl text-sm leading-6 text-slate-500">
    {{ config.description }}
  </p>
</header>
