<aside class="flex h-screen w-72 flex-col border-r border-slate-200 bg-white">
  <!-- Header -->
  <header class="border-b border-slate-200 p-6">
    <div class="flex items-center gap-3">
      <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-900 text-white">
        <!-- logo -->
        <span class="text-xs font-bold">
          <svg lucideShieldCheck class="h-4 w-4"></svg>
        </span>
      </div>

      <div>
        <h2 class="font-semibold text-slate-900">AccessHub</h2>
        <p class="text-sm text-slate-500">Control Center</p>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4" aria-label="Main navigation">
    <div class="space-y-8">
      <!-- Group -->
      <section>
        <p class="mb-3 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
          Administration
        </p>
        <div class="space-y-1">
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
          >
            <span class="flex h-4 w-4 items-center justify-center text-slate-600"> 
              <svg lucideLayoutDashboard class="h-4 w-4"></svg>
            </span>
            Dashboard
          </a>
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
          >
            <span class="flex h-4 w-4 items-center justify-center text-slate-600">
              <svg lucideActivity class="h-4 w-4"></svg>
            </span>
            Access Events
          </a>
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
          >
            <span class="flex h-4 w-4 items-center justify-center text-slate-600">
              <svg lucideUpload class="h-4 w-4"></svg>
            </span>
            Captures
          </a>
        </div>
      </section>

      <!-- Group -->
      <section>
        <p class="mb-3 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
          Management
        </p>
        <div class="space-y-1">
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
          >
            <span class="flex h-4 w-4 items-center justify-center">
              <svg lucideCar class="h-4 w-4"></svg>
            </span>
            Vehicles
          </a>
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl bg-slate-100 px-4 py-3 text-sm font-medium text-slate-900"
          >
            <span class="flex h-4 w-4 items-center justify-center">
              <svg lucideCircleUser class="h-4 w-4"></svg>
            </span>
            Owners
          </a>
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
          >
            <span class="flex h-4 w-4 items-center justify-center">
              <svg lucideUsers class="h-4 w-4"></svg>
            </span>
            Users
          </a>
          <a
            href="#"
            class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm text-slate-600 transition hover:bg-slate-100"
          >
            <span class="flex h-4 w-4 items-center justify-center">
              <svg lucideShield class="h-4 w-4"></svg>
            </span>
            Scopes
          </a>
        </div>
      </section>
    </div>
  </nav>

  <!-- User -->
  <footer class="border-t border-slate-200 p-4">
    <div class="flex items-center justify-between gap-3">
      <div class="flex min-w-0 items-center gap-3">
        <div
          class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-200 text-sm font-medium text-slate-700"
        >
          A
        </div>
        <div class="min-w-0">
          <p class="truncate text-sm font-medium text-slate-900">{{ username() }}</p>
          <p class="truncate text-xs text-slate-500">{{ email() }}</p>
        </div>
      </div>
      <button
        class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 transition hover:border-blue-100 hover:bg-blue-50 hover:text-blue-600 cursor-pointer"
        aria-label="Logout"
        (click)="logout()"
      >
        <svg lucideLogOut class="h-4 w-4"></svg>
      </button>
    </div>
  </footer>
</aside>
