<article
  class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"
>
  <header class="flex items-start justify-between gap-4">
    
    <div class="flex flex-col">
      <p class="text-sm font-medium tracking-wide text-slate-500">
        {{ config.title }}
      </p>

      <h3
        class="mt-3 text-5xl font-bold tracking-tight tabular-nums"
        [class.text-blue-600]="config.color === 'blue'"
        [class.text-red-600]="config.color === 'red'"
        [class.text-amber-600]="config.color === 'amber'"
      >
        {{ config.value }}
      </h3>
    </div>

    <div
      class="flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl"
      [class.bg-blue-50]="config.color === 'blue'"
      [class.text-blue-600]="config.color === 'blue'"
      [class.bg-red-50]="config.color === 'red'"
      [class.text-red-600]="config.color === 'red'"
      [class.bg-amber-50]="config.color === 'amber'"
      [class.text-amber-600]="config.color === 'amber'"
      aria-hidden="true"
    >
      <ng-container *ngComponentOutlet="config.icon"></ng-container>
    </div>

  </header>

  <footer class="mt-6 border-t border-slate-100 pt-4">
    <p class="text-sm leading-relaxed text-slate-500">
      {{ config.description }}
    </p>
  </footer>
</article>
