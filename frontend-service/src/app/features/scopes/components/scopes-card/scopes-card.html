<div
  class="rounded-2xl border border-slate-200 bg-white p-6 shadow-[0_1px_2px_rgba(15,23,42,0.04)] transition-all hover:border-slate-300 hover:shadow-sm"
>
  <div class="flex gap-4">
    <div
      class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border border-indigo-100 bg-indigo-50"
    >
      <lucide-icon [img]="ShieldCheck" class="h-5 w-5 text-indigo-500"> </lucide-icon>
    </div>

    <div class="min-w-0">
      <h3 class="text-sm font-semibold tracking-wide text-slate-900">ADMIN</h3>

      <p class="mt-1 text-sm leading-relaxed text-slate-500">
        Acesso total à plataforma e configurações.
      </p>

      <ul class="mt-5 space-y-2.5">
        <li class="flex items-center gap-2 text-sm text-slate-600">
          <span class="h-1.5 w-1.5 rounded-full bg-indigo-400"></span>
          Gerenciar usuários
        </li>

        <li class="flex items-center gap-2 text-sm text-slate-600">
          <span class="h-1.5 w-1.5 rounded-full bg-indigo-400"></span>
          Configurar sistema
        </li>

        <li class="flex items-center gap-2 text-sm text-slate-600">
          <span class="h-1.5 w-1.5 rounded-full bg-indigo-400"></span>
          Auditoria total
        </li>
      </ul>
    </div>
  </div>
</div>
