<div
  class="rounded-2xl border border-slate-200 bg-white p-6 shadow-[0_1px_2px_rgba(15,23,42,0.04)] transition-all hover:border-slate-300 hover:shadow-sm"
>
  <div class="flex gap-4">
    <div
      class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border"
      [ngClass]="actionColor"
    >
      <svg lucideIcon="icon" class="h-5 w-5"></svg>

    </div>

    <div class="min-w-0 flex-1">
      <div class="flex items-center justify-between gap-3">
        <h3 class="text-sm font-semibold tracking-wide text-slate-900 capitalize">
          {{ resource }}
        </h3>

        <span
          class="rounded-full border px-2.5 py-1 text-xs font-medium capitalize"
          [ngClass]="actionColor"
        >
          {{ action }}
        </span>
      </div>

      <p class="mt-2 text-sm leading-relaxed text-slate-500">
        {{ description }}
      </p>
    </div>
  </div>
</div>
