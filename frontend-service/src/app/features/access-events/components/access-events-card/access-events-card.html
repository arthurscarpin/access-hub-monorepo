<div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
  <!-- Card Component -->
  <div
    class="flex flex-col gap-4 border-b border-slate-200 p-6 lg:flex-row lg:items-center lg:justify-between"
  >
    <div class="relative hidden md:block">
      <svg
        lucideSearch
        class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"
      ></svg>
      <input
        type="text"
        placeholder="Search the platform..."
        class="h-11 w-80 rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm outline-none focus:border-slate-300"
      />
    </div>

    <div class="flex flex-wrap items-center justify-end gap-2">
      <button class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">All</button>
      <button
        class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50"
      >
        Granted
      </button>
      <button
        class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50"
      >
        Denied
      </button>
    </div>
  </div>

  <div class="overflow-x-auto">
    <!-- Table Component -->
    <table class="w-full">
      <thead class="border-b border-slate-200 bg-slate-50">
        <tr class="text-left text-sm font-medium text-slate-500">
          <th class="px-6 py-4">Plate</th>
          <th class="px-6 py-4">Vehicle</th>
          <th class="px-6 py-4">Owner</th>
          <th class="px-6 py-4">Direction</th>
          <th class="px-6 py-4">Status</th>
          <th class="px-6 py-4 text-right">Date</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr class="transition-colors hover:bg-slate-50/60">
          <td class="px-6 py-5">
            <p class="font-semibold text-slate-900">ABC1D23</p>
          </td>
          <td class="px-6 py-5 text-slate-600">Toyota Corolla</td>
          <td class="px-6 py-5 text-slate-600">Mariana Silva</td>
          <td class="px-6 py-5">
            <div class="flex items-center gap-2 text-sm font-medium text-emerald-600">
              <svg lucideIcon="arrow-down-left" class="h-4 w-4"></svg>
              Entry
            </div>
          </td>
          <td class="px-6 py-5">
            <span
              class="inline-flex items-center rounded-full bg-emerald-50 px-3 py-1 text-xs font-medium text-emerald-700"
              >Granted</span
            >
          </td>
          <td class="px-6 py-5 text-right text-sm text-slate-500">20/05, 12:51</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Component -->
  <div
    class="flex flex-col gap-4 border-t border-slate-200 px-6 py-4 text-sm text-slate-500 lg:flex-row lg:items-center lg:justify-between"
  >
    <p>Showing 1–10 of 10 events</p>
    <div class="flex items-center gap-2">
      <button
        class="rounded-xl border border-slate-200 bg-white px-4 py-2 transition hover:bg-slate-50"
      >
        Previous
      </button>
      <button
        class="rounded-xl border border-slate-200 bg-white px-4 py-2 transition hover:bg-slate-50"
      >
        Next
      </button>
    </div>
  </div>
</div>
