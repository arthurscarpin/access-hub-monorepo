<div class="flex min-h-screen bg-slate-100">

  <!-- Side Menu Component -->
  <app-side-menu
    class="fixed left-0 top-0 hidden h-screen w-72 overflow-y-auto border-r border-slate-200 bg-white lg:flex lg:flex-col">
  </app-side-menu>

  <div class="flex min-h-screen flex-1 flex-col lg:ml-72">

    <!-- Top Menu Component -->
    <header 
      app-top-menu 
      class="fixed left-0 top-0 z-40 flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-6 lg:left-72 lg:w-[calc(100%-18rem)]"
    ></header>


    <main class="flex flex-1 flex-col gap-6 p-6 pt-22">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
        <!-- Page Title Component -->
        <app-page-title category="Operation" title="Access Events"
          description="View and manage access events for the system.">
        </app-page-title>
        <div class="flex items-center gap-3">

          <button
            class="flex h-11 items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
            <lucide-angular [img]="Filter" class="h-4 w-4"></lucide-angular>
            Filter
          </button>
          <button
            class="flex h-11 items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
            <lucide-angular [img]="Download" class="h-4 w-4"></lucide-angular>
            Export
          </button>

        </div>
      </div>

      <!-- Events Card Component -->
      <app-access-events-card></app-access-events-card>
    </main>

  </div>

</div>
