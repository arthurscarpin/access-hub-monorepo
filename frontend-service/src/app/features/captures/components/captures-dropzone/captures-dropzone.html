<section
  class="mt-6 rounded-3xl border border-dashed border-slate-300 bg-white p-16"
  aria-labelledby="upload-title"
>
  <header class="flex flex-col items-center text-center">
    <div
      class="flex h-16 w-16 items-center justify-center rounded-2xl bg-slate-100"
      aria-hidden="true"
    >
      <svg lucideCloudUpload class="h-7 w-7 text-slate-600"></svg>
    </div>

    <h2 id="upload-title" class="mt-6 text-xl font-semibold text-slate-900">Upload ZIP file</h2>

    <p class="mt-2 max-w-sm text-sm leading-relaxed text-slate-500">
      Send a single ZIP file containing vehicle capture images.
    </p>
  </header>

  <div class="mt-8 flex flex-col items-center gap-4">
    <label
      for="zip-upload"
      class="cursor-pointer rounded-xl bg-slate-900 px-5 py-3 text-sm font-medium text-white transition hover:bg-slate-800"
    >
      Select ZIP File
    </label>

    <input
      id="zip-upload"
      type="file"
      accept=".zip"
      class="hidden"
      (change)="onFileSelected($event)"
    />

    @if (selectedFile(); as file) {
      <div class="text-sm text-slate-600">
        {{ file.name }}
      </div>

      <button
        type="button"
        class="cursor-pointer rounded-xl bg-emerald-600 px-5 py-3 text-sm font-medium text-white transition hover:bg-emerald-700"
        (click)="upload()"
      >
        Upload file
      </button>
    }

    @if (message()) {
      <div
        class="mt-6 rounded-xl px-4 py-3 text-sm font-medium"
        [class.bg-emerald-50]="messageType() === 'success'"
        [class.text-emerald-700]="messageType() === 'success'"
        [class.border]="messageType() === 'success'"
        [class.border-emerald-200]="messageType() === 'success'"
        [class.bg-red-50]="messageType() === 'error'"
        [class.text-red-700]="messageType() === 'error'"
        [class.border]="messageType() === 'error'"
        [class.border-red-200]="messageType() === 'error'"
      >
        {{ message() }}
      </div>
    }
  </div>

  <footer class="mt-6 text-center">
    <p class="text-sm text-slate-400">Maximum supported file size: 250 MB</p>
  </footer>
</section>
