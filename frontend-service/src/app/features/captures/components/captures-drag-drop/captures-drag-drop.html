<div class="mt-6 rounded-3xl border border-dashed border-slate-300 bg-white p-16">
  <div class="flex flex-col items-center justify-center">
    <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-slate-100">
      <lucide-angular [img]="CloudUpload" class="h-7 w-7 text-slate-600"></lucide-angular>
    </div>
    <h3 class="mt-6 text-xl font-semibold text-slate-900">Drag a .zip file or click to upload</h3>
    <p class="mt-2 text-center text-sm text-slate-500">Maximum size 250MB • Direction automatically detected from
      metadata</p>
    <button
      class="mt-8 rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
      Select file
    </button>
  </div>
</div>
