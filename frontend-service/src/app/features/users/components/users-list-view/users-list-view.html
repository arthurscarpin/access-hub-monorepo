<section class="mt-6 overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
  <!-- Table wrapper -->
  <div class="overflow-x-auto">
    <table class="w-full table-fixed border-collapse">
      <caption class="sr-only">
        Users list table
      </caption>

      <thead class="border-b border-slate-200 bg-slate-50">
        <tr class="text-left text-sm font-medium text-slate-500">
          <th scope="col" class="w-1/4 px-6 py-4">Name</th>
          <th scope="col" class="w-1/4 px-6 py-4">Email</th>
          <th scope="col" class="w-1/4 px-6 py-4">Scopes</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-100">
        @for (user of usersWithScopes(); track user.id) {
          <tr class="transition-colors hover:bg-slate-50/60">
            <td class="px-6 py-5">
              <span class="truncate text-sm font-semibold tracking-wide text-slate-900">
                {{ user.name }}
              </span>
            </td>

            <td class="px-6 py-5">
              <span class="truncate text-sm text-slate-500">
                {{ user.email }}
              </span>
            </td>

            <td class="px-6 py-5">
              <div class="flex flex-wrap items-center gap-1">
                @for (scope of user.scopes.slice(0, 2); track scope.id) {
                  <span
                    class="rounded-full border px-3 py-1 text-xs font-medium"
                    [ngClass]="{
                      'border-blue-200 bg-blue-50 text-blue-600':
                        scope.name.split(':')[1] === 'all',
                      'border-orange-200 bg-orange-50 text-orange-600':
                        scope.name.split(':')[1] === 'write',
                      'border-emerald-200 bg-emerald-50 text-emerald-600':
                        scope.name.split(':')[1] === 'read',
                    }"
                  >
                    {{ scope.name }}
                  </span>
                }

                @if (user.scopes.length > 2) {
                  <span class="ml-1 text-xs font-medium text-slate-400">
                    +{{ user.scopes.length - 2 }}
                  </span>
                }
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="px-6 py-5 text-center text-sm text-slate-400">
              No users found.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <footer
    class="flex items-center justify-end gap-3 border-t border-slate-200 bg-slate-50/50 px-6 py-4"
    aria-label="Table pagination"
  >
    <button
      type="button"
      aria-label="Previous page"
      [disabled]="pagination()?.first"
      class="cursor-pointer rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-medium text-slate-600 transition-all duration-200 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:bg-white"
      (click)="changePage('previous')"
    >
      Previous
    </button>

    <button
      type="button"
      aria-label="Next page"
      [disabled]="pagination()?.last"
      class="cursor-pointer rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-medium text-slate-600 transition-all duration-200 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:bg-white"
      (click)="changePage('next')"
    >
      Next
    </button>
  </footer>
</section>
