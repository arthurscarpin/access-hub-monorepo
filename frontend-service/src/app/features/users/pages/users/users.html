<div class="flex h-screen w-full bg-slate-50 font-sans text-slate-800">
  
  <!-- Side Menu Component -->
  <app-side-menu
    class="fixed left-0 top-0 hidden h-screen w-72 overflow-y-auto border-r border-slate-200 bg-white lg:flex lg:flex-col">
  </app-side-menu>

  <div class="flex min-h-screen flex-1 flex-col lg:ml-72">
    
    <!-- Top Menu Component -->
    <header 
      app-top-menu
      operation="Management"
      page="Users"
      class="fixed left-0 top-0 z-40 flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-6 lg:left-72 lg:w-[calc(100%-18rem)]"
    ></header>
    
    <main class="flex flex-1 flex-col gap-6 p-6 pt-22">
      
      <div class="flex items-start justify-between">
        <!-- Page Title Component -->
        <app-page-title 
          category="Management" 
          title="Users"
          description="Team members with access to the platform and their respective scopes of action.">
        </app-page-title>
        
        <div class="flex items-center gap-3">
          <button class="flex items-center gap-2 rounded-lg bg-slate-950 px-4 py-2 text-xs font-semibold text-white hover:bg-slate-800 shadow-sm transition-colors">
          <lucide-icon [img]="Plus" class="w-4 h-4"></lucide-icon> Invite user
        </button>
        </div>
      </div>
      
      <!-- Users Table Component -->
      <app-users-table></app-users-table>
    </main>
  </div>
</div>
