<form [formGroup]="form">
  <dialog
    open
    class="fixed inset-0 z-50 m-0 flex h-screen w-screen items-center justify-center bg-black/40 p-4"
    aria-labelledby="forgot-password-title"
  >
    <article class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-xl">
      <header class="mb-4">
        <h2 id="forgot-password-title" class="text-lg font-semibold text-slate-900">
          Reset password
        </h2>

        <p class="text-sm text-slate-500">Enter your email and we’ll send you a recovery link.</p>
      </header>

      <fieldset class="space-y-2">
        <label for="recovery-email" class="sr-only"> Recovery email </label>

        <input
          id="recovery-email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="h-12 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
        />

        @if (form.controls.email.touched && form.controls.email.invalid) {
          <p class="text-xs font-medium text-red-500">Please enter a valid email address.</p>
        }
      </fieldset>

      <footer class="mt-6 flex justify-end gap-3">
        <button
          type="button"
          class="flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 transition-all duration-200 hover:border-slate-300 hover:bg-slate-50 hover:text-slate-900 focus:outline-none focus:ring-4 focus:ring-slate-200 active:scale-[0.98] cursor-pointer"
          (click)="close.emit()"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="cursor-pointer rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-800 active:bg-slate-950"
          (click)="submit()"
        >
          Send
        </button>
      </footer>
    </article>
  </dialog>
</form>
