<div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-blue-950 to-blue-600"></div>
<div class="absolute inset-0 opacity-20 banner-effect"></div>
<div
  class="absolute left-1/2 top-1/2 h-[500px] w-[500px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-blue-500/20 blur-3xl"
></div>
<div class="relative z-10 flex h-full flex-col justify-between p-16 text-white">
  <div class="flex items-center gap-3">
    <div
      class="flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/10 backdrop-blur-md"
    >
      <lucide-angular [img]="ShieldCheck" class="h-5 w-5 text-white-400"></lucide-angular>
    </div>
    <span class="text-lg font-semibold text-white">AccessHub </span>
  </div>
  <div class="mx-auto max-w-xl">
    <h1 class="text-center text-5xl font-semibold leading-tight">Vehicle access control</h1>
    <p class="mx-auto mt-6 max-w-md text-center text-lg text-slate-300">
      Monitor events in real time, manage vehicles and owners, and process batches of captures.
    </p>
    <div class="mt-14 flex items-center justify-center gap-12">
      <div class="text-center">
        <h3 class="text-3xl font-semibold">12.4k</h3>
        <p class="mt-1 text-sm text-slate-400">Events/day</p>
      </div>
      <div class="text-center">
        <h3 class="text-3xl font-semibold">99.98%</h3>
        <p class="mt-1 text-sm text-slate-400">Uptime</p>
      </div>
      <div class="text-center">
        <h3 class="text-3xl font-semibold">&lt;120ms</h3>
        <p class="mt-1 text-sm text-slate-400">Latency</p>
      </div>
    </div>
  </div>
  <div class="text-sm text-slate-500">&copy; 2026 All rights reserved AccessHub.</div>
</div>
