<div class="w-full max-w-lg">
  <div class="rounded-3xl border border-slate-200 bg-white p-10 shadow-sm">
    <div
      class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-3 py-1"
    >
      <div class="h-2 w-2 rounded-full bg-emerald-500"></div>
      <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Login </span>
    </div>
    <div class="mt-6">
      <h2 class="text-4xl font-semibold text-slate-900">Welcome back</h2>
      <p class="mt-3 text-slate-500">Access your account to continue managing access.</p>
    </div>
    <form class="mt-10 space-y-6">
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700">Corporate email </label>
        <div class="relative">
          <lucide-angular
            [img]="Mail"
            class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
          ></lucide-angular>
          <input
            type="email"
            placeholder="your-email@accesshub.io"
            class="h-14 w-full rounded-2xl border border-slate-200 bg-white pl-14 pr-4 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition-all duration-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
          />
        </div>
      </div>
      <div>
        <div class="mb-2 flex items-center justify-between">
          <label class="text-sm font-medium text-slate-700">Password</label>
          <button
            type="button"
            class="text-sm font-medium text-blue-600 transition hover:text-blue-700"
          >
            Forgot?
          </button>
        </div>
        <div class="relative">
          <lucide-angular
            [img]="Lock"
            class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
          ></lucide-angular>
          <input
            type="password"
            placeholder="••••••••"
            class="h-14 w-full rounded-2xl border border-slate-200 bg-white pl-14 pr-14 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition-all duration-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
          />
          <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2">
            <lucide-angular [img]="Eye" class="h-5 w-5 text-slate-400"></lucide-angular>
          </button>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-3 text-sm text-slate-600">
          <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-slate-900" />
          Keep me signed in
        </label>
      </div>
      <button
        type="submit"
        class="flex h-14 w-full items-center justify-center gap-2 rounded-2xl bg-slate-900 text-sm font-medium text-white transition hover:bg-slate-800"
      >
        Login
        <lucide-angular [img]="ArrowRight" class="h-4 w-4"></lucide-angular>
      </button>
    </form>
    <p class="mt-8 text-center text-sm text-slate-500">
      Don’t have an account?
      <a href="#" class="font-medium text-blue-600 hover:text-blue-700">Request access </a>
    </p>
  </div>
</div>
