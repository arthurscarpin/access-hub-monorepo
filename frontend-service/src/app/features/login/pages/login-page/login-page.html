<main class="grid min-h-screen grid-cols-1 lg:grid-cols-2">
  <!-- Presentation Section -->
  <section
    aria-labelledby="presentation-title"
    class="relative hidden h-full overflow-hidden bg-slate-950 lg:flex"
  >
    <!-- Background -->
    <div
      aria-hidden="true"
      class="absolute inset-0 bg-gradient-to-br from-slate-950 via-blue-950 to-blue-600"
    ></div>

    <div aria-hidden="true" class="banner-effect absolute inset-0 opacity-20"></div>

    <div
      aria-hidden="true"
      class="absolute left-1/2 top-1/2 h-[500px] w-[500px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-blue-500/20 blur-3xl"
    ></div>

    <!-- Content -->
    <div class="relative z-10 flex h-full w-full flex-col justify-between p-16 text-white">
      <!-- Brand -->
      <header class="flex items-center gap-3">
        <!-- Logo -->
        <div
          class="flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/10 backdrop-blur-md"
        >
          <span class="text-sm font-bold text-white">
            <svg lucideShieldCheck class="h-4 w-4"></svg>
          </span>
        </div>

        <p class="text-lg font-semibold text-white">AccessHub</p>
      </header>

      <!-- Main Content -->
      <article class="mx-auto max-w-xl text-center">
        <h1 id="presentation-title" class="text-5xl font-semibold leading-tight">
          Vehicle access control
        </h1>

        <p class="mx-auto mt-6 max-w-md text-lg text-slate-300">
          Monitor events in real time, manage vehicles and owners, and process batches of captures.
        </p>
      </article>

      <!-- Footer -->
      <footer class="text-sm text-slate-500">&copy; 2026 AccessHub. All rights reserved.</footer>
    </div>
  </section>
  <section
    class="flex h-full items-center justify-center bg-slate-50 px-6 py-10"
    aria-labelledby="login-title"
  >
    <div class="w-full max-w-lg">
      <!-- Login Card Component -->
      <app-login-card></app-login-card>
    </div>
  </section>
</main>
