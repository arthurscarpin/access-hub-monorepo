<div
  class="rounded-2xl border border-slate-200 bg-white p-6 shadow-[0_1px_2px_rgba(15,23,42,0.04)] transition-all hover:border-slate-300 hover:shadow-sm"
>
  <div class="flex gap-4">
    <div
      class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border"
      [ngClass]="{
        'border-blue-200 bg-blue-50 text-blue-600': action === 'all',
        'border-orange-200 bg-orange-50 text-orange-600': action === 'write',
        'border-emerald-200 bg-emerald-50 text-emerald-600': action === 'read',
      }"
    >
      <ng-container *ngComponentOutlet="icon"></ng-container>
    </div>

    <div class="min-w-0 flex-1">
      <div class="flex items-center justify-between gap-3">
        <h3 class="text-sm font-semibold tracking-wide text-slate-900 capitalize">
          {{ resource }}
        </h3>
        <span 
          class="rounded-full border px-2.5 py-1 text-xs font-medium capitalize"
          [ngClass]="{
            'border-blue-200 bg-blue-50 text-blue-700': action === 'all',
            'border-orange-200 bg-orange-50 text-orange-700': action === 'write',
            'border-emerald-200 bg-emerald-50 text-emerald-700': action === 'read'
          }"
        >{{ action }}</span>
      </div>
      <p class="mt-2 text-sm leading-relaxed text-slate-500">{{ description }}</p>
    </div>
  </div>
</div>
