<form>
  <span
    class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400"
  >
    Login
  </span>

  <h2 class="mt-3 text-3xl font-semibold text-slate-900">
    Welcome back
  </h2>

  <p class="mt-2 text-sm text-slate-500">
    Access your account to continue managing access.
  </p>

  <!-- email -->
  <div class="mt-8">
    <label class="mb-2 block text-sm font-medium text-slate-700">
      Corporate Email
    </label>

    <input
      type="email"
      formControlName="email"
      class="h-12 w-full rounded-xl border border-slate-200 bg-white px-4 outline-none transition focus:border-blue-500"
      placeholder="your-email@accesshub.com"
    />
  </div>

  <!-- password -->
  <div class="mt-5">
    <div class="mb-2 flex items-center justify-between">
      <label class="text-sm font-medium text-slate-700">
        Password
      </label>

      <button
        type="button"
        class="text-sm text-blue-600 hover:text-blue-700"
      >
        Forgot?
      </button>
    </div>

    <input
      type="password"
      formControlName="password"
      class="h-12 w-full rounded-xl border border-slate-200 bg-white px-4 outline-none transition focus:border-blue-500"
      placeholder="********"
    />
  </div>

  <!-- remember -->
  <label
    class="mt-5 flex items-center gap-2 text-sm text-slate-600"
  >
    <input type="checkbox" />

    Keep me signed in for 30 days
  </label>

  <!-- button -->
  <button
    type="submit"
    class="mt-8 flex h-12 w-full items-center justify-center rounded-xl bg-slate-900 font-medium text-white transition hover:bg-slate-800"
  >
    Login
  </button>

  <!-- footer -->
  <p class="mt-8 text-center text-sm text-slate-500">
    Don't have an account?

    <a
      href="#"
      class="font-medium text-blue-600 hover:text-blue-700"
    >
      Request access
    </a>
  </p>
</form>
