<header
  class="fixed left-0 top-0 z-40 flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-6 lg:left-72 lg:w-[calc(100%-18rem)]"
>
  <!-- Breadcrumb -->
  <div class="flex items-center gap-3">
    <p class="text-sm text-slate-500">{{ screenOperation }}</p>
    <span class="text-slate-300">/</span>
    <p class="text-sm font-medium text-slate-900">{{ screenName }}</p>
  </div>

  <!-- Right -->
  <div class="relative flex items-center gap-4">
    <!-- Bell -->
    <button
      class="relative flex h-11 w-11 items-center justify-center rounded-xl border border-slate-200 bg-white hover:bg-slate-50 transition cursor-pointer"
      (click)="toggle()"
    >
      <svg lucideBell class="h-5 w-5 text-slate-600"></svg>

      @if (unreadCount() > 0) {
        <span
          class="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white"
        >
          {{ unreadCount() }}
        </span>
      }
    </button>

    <!-- Dropdown -->
    @if (isOpen()) {
      <div
        class="absolute right-0 top-14 w-80 rounded-2xl border border-slate-200 bg-white shadow-xl overflow-hidden"
      >
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3">
          <p class="text-sm font-semibold text-slate-900">Notifications</p>

          <button
            class="text-xs font-medium text-blue-600 hover:text-blue-700"
            (click)="markAllAsRead()"
          >
            Mark all
          </button>
        </div>

        <!-- List -->
        <div class="max-h-80 overflow-y-auto">
          @for (n of notifications(); track n.id) {
            <div
              class="flex gap-3 px-4 py-3 hover:bg-slate-50 cursor-pointer transition"
              (click)="markAsRead(n.id)"
            >
              <!-- status dot -->
              <div
                class="mt-1 h-2 w-2 rounded-full"
                [class.bg-yellow-400]="n.status === 'PENDING'"
                [class.bg-blue-500]="n.status === 'PROCESSING'"
                [class.bg-emerald-500]="n.status === 'COMPLETED'"
                [class.bg-red-500]="n.status === 'FAILED'"
              ></div>

              <div class="flex-1">
                <p class="text-sm font-medium text-slate-900">
                  {{ n.title }}
                </p>

                <p class="text-xs text-slate-500">
                  {{ n.description }}
                </p>
              </div>

              <!-- unread dot -->
              <div class="mt-1">
                <div
                  class="h-2 w-2 rounded-full"
                  [class.bg-slate-300]="n.read"
                  [class.bg-blue-500]="!n.read"
                ></div>
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</header>
