<div class="mt-6 overflow-hidden rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="flex flex-col gap-6">
    <!-- Filter Buttons -->
    <div class="flex flex-wrap justify-end gap-3">
      @for (filter of filterOptions; track filter) {
        <button
          (click)="selectFilter(filter)"
          class="rounded-xl border px-5 py-2.5 text-sm font-medium cursor-pointer transition-all duration-200"
          [class.bg-slate-900]="selectedFilter() === filter"
          [class.text-white]="selectedFilter() === filter"
          [class.border-slate-900]="selectedFilter() === filter"
          [class.bg-white]="selectedFilter() !== filter"
          [class.text-slate-600]="selectedFilter() !== filter"
          [class.border-slate-200]="selectedFilter() !== filter"
          [class.hover:bg-slate-50]="selectedFilter() !== filter"
        >
          {{ filter }}
        </button>
      }
    </div>

    <!-- Generic table -->
    <app-access-events-table [data]="filteredEvents()"></app-access-events-table>

    <!-- Pagination-->
    <div class="flex justify-end gap-3 pt-2">
      @for (btn of paginationButtons; track btn.label) {

        <app-button
          [label]="btn.label"
          [customStyle]="'rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-medium text-slate-600 transition-all duration-200 hover:bg-slate-50 cursor-pointer'"
          (click)="handlePagination(btn.action)"
        ></app-button>
      }
    </div>
  </div>
</div>
