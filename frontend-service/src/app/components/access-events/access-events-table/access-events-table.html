<table class="w-full">
  <thead class="border-b border-slate-200 bg-slate-50">
    <tr class="text-left text-sm font-medium text-slate-500">
      <th class="px-6 py-4">Plate</th>
      <th class="px-6 py-4">Direction</th>
      <th class="px-6 py-4">Status</th>
      <th class="px-6 py-4">Date</th>
    </tr>
  </thead>

  <tbody class="divide-y divide-slate-100">
    @for (row of data; track row.id) {
      <tr class="transition-colors hover:bg-slate-50/60">
        <td class="px-6 py-5">
          <span class="text-sm font-semibold text-slate-900 tracking-wide">
            {{ row.plate }}
          </span>
        </td>

        <td class="px-6 py-5">
          <div
            class="flex items-center gap-2 text-sm font-medium"
            [class.text-emerald-600]="row.direction === 'Entry'"
            [class.text-red-600]="row.direction === 'Exit'"
          >
            <ng-container *ngComponentOutlet="row.icon"></ng-container>
            <span>{{ row.direction }}</span>
          </div>
        </td>

        <td class="px-6 py-5">
          <span
            class="px-3 py-1 rounded-full text-xs font-semibold"
            [class.bg-emerald-50]="row.status === 'Granted'"
            [class.text-emerald-700]="row.status === 'Granted'"
            [class.bg-red-50]="row.status === 'Denied'"
            [class.text-red-700]="row.status === 'Denied'"
          >
            {{ row.status }}
          </span>
        </td>

        <td class="px-6 py-5">
          <span class="text-sm text-slate-400">
            {{ row.date | date: 'MM/dd/yy, h:mm a' }}
          </span>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="4" class="px-6 py-10 text-center text-sm text-slate-400">
          No access events found.
        </td>
      </tr>
    }
  </tbody>
</table>
