<section class="flex items-center justify-center bg-slate-50 px-6 py-10 h-full">
  <div class="w-full max-w-lg">
    <div class="rounded-3xl border border-slate-200 bg-white p-10 shadow-sm">
      <!-- Login Status -->
      <div class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-3 py-1">
        <div class="h-2 w-2 rounded-full bg-emerald-500"></div>
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Login</span>
      </div>

      <!-- Login Text Content -->
      <div class="mt-6">
        <h2 class="text-4xl font-semibold text-slate-900">Welcome to AccessHub</h2>
        <p class="mt-3 text-slate-500">Access your account to continue managing access.</p>
      </div>

      <!-- Error Message Content -->
      @if (errorMessage()) {
        <div class="mb-4 mt-4 rounded-xl bg-red-50 p-3 text-sm text-red-600 border border-red-200">
          {{ errorMessage() }}
        </div>
      }

      <!-- Login Form -->
      <form class="mt-10 space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
        
        <!-- Email Field -->
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Email</label>
          
          <div class="relative">
            <svg lucideMail class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></svg>
            <input
              type="email"
              formControlName="email"
              placeholder="Enter your email"
              class="h-14 w-full rounded-2xl border border-slate-200 bg-white pl-14 pr-4 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition-all duration-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <div class="mb-2 flex items-center justify-between">
            <label class="text-sm font-medium text-slate-700">Password</label>
            <button type="button" class="text-sm font-medium text-blue-600 transition hover:text-blue-700">Forgot?</button>
          </div>
          
          <div class="relative">
            <svg lucideLock class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></svg>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
              class="h-14 w-full rounded-2xl border border-slate-200 bg-white pl-14 pr-14 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition-all duration-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
            />

            <!-- Eye Button -->
            <button 
              type="button" 
              class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer"
              (click)="togglePassword()"
            >
              @if (showPassword()) {
                <svg lucideEyeOff class="h-5 w-5 text-slate-400"></svg>
              } @else {
                <svg lucideEye class="h-5 w-5 text-slate-400"></svg>
              }
            </button>
          
          </div>
        </div>

        <!-- Login Checkbox-->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-3 text-sm text-slate-600">
            <input
              type="checkbox"
              formControlName="rememberMe"
              class="h-4 w-4 rounded border-slate-300 text-slate-900"
            />
            Keep me signed in
          </label>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          [disabled]="form.invalid"
          class="flex h-14 w-full items-center justify-center gap-2 rounded-2xl bg-slate-900 text-sm font-medium text-white transition hover:bg-slate-800 disabled:opacity-50 cursor-pointer"
        >
          Login
          <svg lucideArrowRight class="w-4 h-4"></svg>
        </button>
      </form>
    </div>
  </div>
</section>
