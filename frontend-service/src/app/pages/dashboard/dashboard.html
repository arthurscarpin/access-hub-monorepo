<div class="flex min-h-screen bg-slate-100">
  <!-- Side Menu Component -->
  <app-sidebar
    class="fixed left-0 top-0 hidden h-screen w-72 overflow-y-auto border-r border-slate-200 bg-white lg:flex lg:flex-col"
  ></app-sidebar>

  <div class="flex min-h-screen flex-1 flex-col lg:ml-72">
    <!-- Menu Component -->
    <app-menu [screenOperation]="breadCrumbOperation" [screenName]="breadCrumbName"></app-menu>

    <main class="flex-1 p-6 pt-22">
      <div class="flex items-start justify-between">
        <!-- Page Header Component -->
        <app-page-header
          [category]="pageCategory"
          [title]="pageTitle"
          [description]="pageDescription"
        ></app-page-header>
      </div>

      <div class="mt-8 grid gap-6 md:grid-cols-2 xl:grid-cols-4">
        <!-- cards -->
        @for (card of eventCards; track card.title) {
          <app-event-card
            [title]="card.title"
            [value]="card.value"
            [percentage]="card.percentage"
            [description]="card.description"
            [icon]="card.icon"
          >
          </app-event-card>
        }
      </div>

      <!-- Capture History -->
      <div class="mt-6">
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <div class="flex items-center justify-between border-b border-slate-200 px-6 py-5">
            <div>
              <h3 class="font-semibold text-slate-900">Recent events</h3>
              <p class="mt-1 text-sm text-slate-500">Updated in real time</p>
            </div>
            <button class="cursor-pointer text-sm font-medium text-slate-600">View all</button>
          </div>

          <!-- Capture History Item Component -->
          @for (event of eventHistory; track event.plate) {
            <app-event-history-item
              [plate]="event.plate"
              [vehicle]="event.vehicle"
              [status]="event.status"
              [icon]="event.icon"
            >
            </app-event-history-item>
          }
        </div>
      </div>
    </main>
  </div>
</div>
