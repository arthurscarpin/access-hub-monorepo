services:
  postgres:
    image: postgres:16
    container_name: access-control-postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - access-control-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:5.0
    container_name: access-control-mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - access-control-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: access-control-rabbit-mq
    environment:
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - access-control-rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  backend-service:
    build:
      context: ./backend-service
      dockerfile: Dockerfile
    container_name: backend-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${ENVIRONMENT}
      ENVIRONMENT: ${ENVIRONMENT}
      STORAGE_PATH: ${STORAGE_PATH}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_AUTHENTICATION: ${MONGO_AUTHENTICATION}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_OCR_ROUTING_KEY: ${RABBITMQ_OCR_ROUTING_KEY}
      RABBITMQ_OCR_QUEUE: ${RABBITMQ_OCR_QUEUE}
      RABBITMQ_OCR_STATUS_ROUTING_KEY: ${RABBITMQ_OCR_STATUS_ROUTING_KEY}
      RABBITMQ_OCR_STATUS_QUEUE: ${RABBITMQ_OCR_STATUS_QUEUE}
      RABBITMQ_AI_VALIDATION_ROUTING_KEY: ${RABBITMQ_AI_VALIDATION_ROUTING_KEY}
      RABBITMQ_AI_VALIDATION_QUEUE: ${RABBITMQ_AI_VALIDATION_QUEUE}
      RABBITMQ_AI_RESULT_QUEUE: ${RABBITMQ_AI_RESULT_QUEUE}
      RABBITMQ_AI_RESULT_ROUTING_KEY: ${RABBITMQ_AI_RESULT_ROUTING_KEY}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  recognize-plate-service:
    build:
      context: ./recognize-plate-service
      dockerfile: Dockerfile
    container_name: recognize-plate-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend-service:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      STORAGE_PATH: ${STORAGE_PATH}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_OCR_ROUTING_KEY: ${RABBITMQ_OCR_ROUTING_KEY}
      RABBITMQ_OCR_QUEUE: ${RABBITMQ_OCR_QUEUE}
      RABBITMQ_OCR_STATUS_ROUTING_KEY: ${RABBITMQ_OCR_STATUS_ROUTING_KEY}
      RABBITMQ_OCR_STATUS_QUEUE: ${RABBITMQ_OCR_STATUS_QUEUE}
      RABBITMQ_AI_VALIDATION_ROUTING_KEY: ${RABBITMQ_AI_VALIDATION_ROUTING_KEY}
      RABBITMQ_AI_VALIDATION_QUEUE: ${RABBITMQ_AI_VALIDATION_QUEUE}
      RABBITMQ_MAX_RETRIES: ${RABBITMQ_MAX_RETRIES}
      RABBITMQ_BASE_DELAY_SECONDS: ${RABBITMQ_BASE_DELAY_SECONDS}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  plate-intelligence-service:
    build:
      context: ./plate-intelligence-service
      dockerfile: Dockerfile
    container_name: plate-intelligence-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend-service:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_AI_VALIDATION_QUEUE: ${RABBITMQ_AI_VALIDATION_QUEUE}
      RABBITMQ_AI_RESULT_ROUTING_KEY: ${RABBITMQ_AI_RESULT_ROUTING_KEY}
      RABBITMQ_MAX_RETRIES: ${RABBITMQ_MAX_RETRIES}
      RABBITMQ_BASE_DELAY_SECONDS: ${RABBITMQ_BASE_DELAY_SECONDS}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGCHAIN_DEBUG: ${LANGCHAIN_DEBUG}
      LLM_MODEL: ${LLM_MODEL}
      TEMPERATURE: ${TEMPERATURE}
      MAX_TOKENS: ${MAX_TOKENS}
    restart: unless-stopped

  frontend-service:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: frontend-service
    depends_on:
      - backend-service
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  access-control-pgdata:
  access-control-mongo-data:
  access-control-rabbitmq-data:
