name: Frontend Service CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend-service/**'

jobs:
  # =========================
  # JOB 1 - TESTS + COVERAGE + BUILD
  # =========================
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        run: npm test -- --watch=false --coverage --coverage-reporters=lcov --coverage-reporters=text-summary
      - name: Build production bundle
        run: npm run build -- --configuration production
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-service-dist
          path: frontend-service/dist/frontend-service/browser/
          retention-days: 7
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend-service/coverage/
          retention-days: 1

  # =========================
  # JOB 2 - SONAR
  # =========================
  sonar:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: frontend-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend-service/coverage/
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_FRONTEND_PROJECT_KEY || vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectBaseDir=frontend-service
            -Dsonar.sources=src/app
            -Dsonar.tests=src/app
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.typescript.lcov.reportPaths=coverage/frontend-service/lcov.info
            -Dsonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**
            -Dsonar.sourceEncoding=UTF-8

  # =========================
  # JOB 3 - SECURITY
  # =========================
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-service/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend-service
          npm ci
      - name: Build project
        run: |
          cd frontend-service
          npm run build -- --configuration production
      - name: Analyze security
        uses: github/codeql-action/analyze@v3
