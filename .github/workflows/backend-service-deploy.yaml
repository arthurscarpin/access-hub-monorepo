name: Backend Service CI/CD

# Only Pull Request
on:
  pull_request:
    branches: [main]
    paths:
      - "backend-service/**"

jobs:
  # Job 1 - Build + Test + Coverage
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Set environment variables
        run: echo "ENVIRONMENT=${{ secrets.ENVIRONMENT }}" >> $GITHUB_ENV
      - name: Build + Test + Coverage
        run: mvn clean verify
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend-service/target/site/jacoco
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-service-jar
          path: backend-service/target/*.jar

  # JOB 2 - SonarCloud - Quality Gate
  sonar:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: backend-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.coverage.jacoco.xmlReportPaths=backend-service/target/site/jacoco/jacoco.xml
            
  # JOB 3 - Security - CodeQL
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Build project
        run: cd backend-service && mvn clean compile
      - name: Analyze security
        uses: github/codeql-action/analyze@v3
