name: Recognize Plate Service CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'recognize-plate-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'recognize-plate-service/**'

jobs:
  # =========================
  # JOB 1 - TESTS + COVERAGE
  # =========================
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recognize-plate-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('recognize-plate-service/uv.lock') }}

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: recognize-plate-service/coverage.xml


  # =========================
  # JOB 2 - SONAR
  # =========================
  sonar:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: recognize-plate-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: recognize-plate-service/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=test
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sourceEncoding=UTF-8

  # =========================
  # JOB 3 - SECURITY
  # =========================
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: |
          cd recognize-plate-service
          uv sync --frozen --no-dev

      - name: Build project
        run: |
          cd recognize-plate-service
          python -m compileall src

      - name: Analyze security
        uses: github/codeql-action/analyze@v3