name: Backend Service CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend-service/**'

jobs:
  # =========================
  # JOB 1 - Build | Test | Coverage
  # =========================
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-service
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: maven
      - name: Set env vars
        run: |
          echo "ENVIRONMENT=${{ vars.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "STORAGE_PATH=${{ vars.STORAGE_PATH }}" >> $GITHUB_ENV
          echo "POSTGRES_HOST=${{ vars.POSTGRES_HOST }}" >> $GITHUB_ENV
          echo "POSTGRES_PORT=${{ vars.POSTGRES_PORT }}" >> $GITHUB_ENV
          echo "POSTGRES_DB=${{ vars.POSTGRES_DB }}" >> $GITHUB_ENV
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> $GITHUB_ENV
          echo "MONGO_HOST=${{ vars.MONGO_HOST }}" >> $GITHUB_ENV
          echo "MONGO_PORT=${{ vars.MONGO_PORT }}" >> $GITHUB_ENV
          echo "MONGO_DB=${{ vars.MONGO_DB }}" >> $GITHUB_ENV
          echo "MONGO_USER=${{ secrets.MONGO_USER }}" >> $GITHUB_ENV
          echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}" >> $GITHUB_ENV
          echo "MONGO_AUTHENTICATION=${{ secrets.MONGO_AUTHENTICATION }}" >> $GITHUB_ENV
          echo "RABBITMQ_HOST=${{ vars.RABBITMQ_HOST }}" >> $GITHUB_ENV
          echo "RABBITMQ_PORT=${{ vars.RABBITMQ_PORT }}" >> $GITHUB_ENV
          echo "RABBITMQ_VIRTUAL_HOST=${{ vars.RABBITMQ_VIRTUAL_HOST }}" >> $GITHUB_ENV
          echo "RABBITMQ_EXCHANGE=${{ vars.RABBITMQ_EXCHANGE }}" >> $GITHUB_ENV
          echo "RABBITMQ_OCR_ROUTING_KEY=${{ vars.RABBITMQ_OCR_ROUTING_KEY }}" >> $GITHUB_ENV
          echo "RABBITMQ_OCR_QUEUE=${{ vars.RABBITMQ_OCR_QUEUE }}" >> $GITHUB_ENV
          echo "RABBITMQ_OCR_STATUS_ROUTING_KEY=${{ vars.RABBITMQ_OCR_STATUS_ROUTING_KEY }}" >> $GITHUB_ENV
          echo "RABBITMQ_OCR_STATUS_QUEUE=${{ vars.RABBITMQ_OCR_STATUS_QUEUE }}" >> $GITHUB_ENV
          echo "RABBITMQ_AI_VALIDATION_ROUTING_KEY=${{ vars.RABBITMQ_AI_VALIDATION_ROUTING_KEY }}" >> $GITHUB_ENV
          echo "RABBITMQ_AI_VALIDATION_QUEUE=${{ vars.RABBITMQ_AI_VALIDATION_QUEUE }}" >> $GITHUB_ENV
          echo "RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}" >> $GITHUB_ENV
          echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> $GITHUB_ENV
      - name: Create JWT keys for tests
        run: |
          mkdir -p src/test/resources
          echo "${{ secrets.JWT_PUBLIC_KEY }}" > src/test/resources/authz.pub
          echo "${{ secrets.JWT_PRIVATE_KEY }}" > src/test/resources/authz.pem
      - name: Run tests + coverage
        run: mvn clean verify
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-service-jar
          path: backend-service/target/*.jar
          retention-days: 7
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend-service/target/site/jacoco/
          retention-days: 1

  # =========================
  # JOB 2 - SonarCloud
  # =========================
  sonar:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: backend-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend-service/target/site/jacoco/
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: maven
      - name: Create JWT keys for Sonar analysis
        run: |
          mkdir -p src/test/resources
          echo "${{ secrets.JWT_PUBLIC_KEY_PEM }}" > src/test/resources/authz.pub
          echo "${{ secrets.JWT_PRIVATE_KEY_PEM }}" > src/test/resources/authz.pem
      - name: Compile bytecode for Sonar
        run: mvn compile -DskipTests
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=backend-service/src/main/java
            -Dsonar.tests=backend-service/src/test/java
            -Dsonar.java.binaries=backend-service/target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=backend-service/target/site/jacoco/jacoco.xml
            -Dsonar.scm.exclusions.disabled=true

  # =========================
  # JOB 3 - Security (CodeQL)
  # =========================
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Create JWT keys for CodeQL build
        run: |
          mkdir -p backend-service/src/test/resources
          echo "${{ secrets.JWT_PUBLIC_KEY }}" > backend-service/src/test/resources/authz.pub
          echo "${{ secrets.JWT_PRIVATE_KEY }}" > backend-service/src/test/resources/authz.pem
      - name: Build project
        run: cd backend-service && mvn clean compile
      - name: Analyze security
        uses: github/codeql-action/analyze@v3