<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Access Control System Platform Architecture</title>
  <desc id="desc">Architecture diagram showing backend, PostgreSQL, MongoDB, RabbitMQ, OCR worker, AI worker, client, and shared storage.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .service { fill: #eef6ff; stroke: #2563eb; }
      .data { fill: #f0fdf4; stroke: #16a34a; }
      .queue { fill: #fff7ed; stroke: #ea580c; }
      .text { font: 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .title { font: 22px Arial, sans-serif; font-weight: 700; fill: #0f172a; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .mutual { stroke: #475569; stroke-width: 2.2; fill: none; marker-start: url(#arrowStart); marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M9,0 L9,6 L0,3 z" fill="#475569"/></marker>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="42" y="48">Access Control System - Platform Architecture</text>
  <rect class="box" x="50" y="250" width="170" height="82"/>
  <text class="text" x="92" y="285">Client</text><text class="small" x="82" y="310">REST consumer</text>
  <rect class="box service" x="330" y="220" width="210" height="112"/>
  <text class="text" x="377" y="262">backend-service</text><text class="small" x="363" y="288">API, auth, business rules</text><text class="small" x="365" y="310">capture orchestration</text>
  <rect class="box queue" x="660" y="220" width="210" height="112"/>
  <text class="text" x="718" y="262">RabbitMQ</text><text class="small" x="700" y="288">Topic exchange</text><text class="small" x="690" y="310">OCR and AI queues</text>
  <rect class="box service" x="980" y="130" width="180" height="92"/>
  <text class="text" x="1002" y="170">OCR worker</text><text class="small" x="1007" y="195">recognize-plate</text>
  <rect class="box service" x="960" y="360" width="210" height="92"/>
  <text class="text" x="990" y="400">AI plate worker</text><text class="small" x="1002" y="425">plate-intelligence</text>
  <rect class="box data" x="300" y="430" width="170" height="82"/>
  <text class="text" x="340" y="465">PostgreSQL</text><text class="small" x="324" y="490">owners, vehicles, events</text>
  <rect class="box data" x="500" y="430" width="170" height="82"/>
  <text class="text" x="552" y="465">MongoDB</text><text class="small" x="525" y="490">capture documents</text>
  <rect class="box data" x="970" y="20" width="190" height="72"/>
  <text class="text" x="1004" y="55">Shared Storage</text><text class="small" x="1005" y="78">capture images</text>
  <path class="line" d="M220 291 H330"/><text class="small" x="246" y="278">HTTP REST</text>
  <path class="line" d="M540 276 H660"/><text class="small" x="565" y="262">publish jobs</text>
  <path class="mutual" d="M765 220 C800 150, 900 150, 980 176"/><text class="small" x="795" y="150">OCR jobs and status</text>
  <path class="mutual" d="M870 288 C930 310, 930 385, 960 406"/><text class="small" x="890" y="345">AI jobs and results</text>
  <path class="line" d="M1065 92 V130"/><text class="small" x="1080" y="116">read images</text>
  <path class="line" d="M405 332 V430"/><path class="line" d="M510 332 C540 370, 570 390, 585 430"/><text class="small" x="430" y="378">persist state</text>
</svg>
